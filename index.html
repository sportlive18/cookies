<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cookies</title>
  <style>
    body {
      font-family: monospace;
      background: #111;
      color: #0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h2 { color: #fff; }
    #cookie-box {
      background: #1a1a1a;
      border: 1px solid #0f0;
      padding: 20px;
      border-radius: 8px;
      max-width: 90vw;
      word-break: break-all;
    }
    button {
      margin-top: 15px;
      padding: 8px 20px;
      background: #0f0;
      color: #111;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>🍪 Cookie</h2>
  <div id="cookie-box">Loading...</div>
  <button onclick="copyCookie()">Copy Cookie</button>

  <script>
    let cookieValue = '';

    fetch('/cookies.json')
      .then(r => r.json())
      .then(data => {
        cookieValue = data.cookie || JSON.stringify(data);
        document.getElementById('cookie-box').textContent = cookieValue;
      })
      .catch(err => {
        document.getElementById('cookie-box').textContent = 'Error loading cookie: ' + err;
      });

    function copyCookie() {
      navigator.clipboard.writeText(cookieValue)
        .then(() => alert('Copied!'))
        .catch(() => alert('Copy failed'));
    }
  </script>
</body>
</html>
